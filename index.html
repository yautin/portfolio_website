<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Apply a saved light theme before first paint (dark is the default) so
         there is no flash of the wrong theme. -->
    <script>
      try {
        if (localStorage.getItem("theme") === "light")
          document.documentElement.dataset.theme = "light";
      } catch (e) {}
    </script>

    <title>Marco Ng — Medical Writer</title>
    <meta
      name="description"
      content="Marco Ng is a medical writer based in Hong Kong, turning complex science and data into clear, accurate medical communications."
    />

    <!-- Open Graph / social sharing -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Marco Ng — Medical Writer" />
    <meta
      property="og:description"
      content="Turning complex science and data into clear, accurate medical communications."
    />

    <!-- Twitter card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Marco Ng — Medical Writer" />
    <meta
      name="twitter:description"
      content="Turning complex science and data into clear, accurate medical communications."
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
